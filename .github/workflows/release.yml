name: Release

# 版本发布流水线（三平台矩阵）。
#
# 触发策略：
#   - 推送 v* tag：全平台并行构建，并在 GitHub Releases 创建发行版
#   - workflow_dispatch：输入 tag 名模拟触发（用于不实际打 tag 也能测试流水线）
#
# 预发行版判定：tag 含 -alpha / -beta / -rc / -pre 时标记为 Pre-release。
# 三平台产物统一上传到同一个 Release。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "模拟触发的 tag 名（如 v0.1.0-alpha.1）"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}
      prerelease: ${{ steps.t.outputs.prerelease }}
    steps:
      - id: t
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ -(alpha|beta|rc|pre)(\.|$) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.platform }})
    needs: resolve
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - {platform: windows, os: windows-latest, target: x86_64-pc-windows-gnu}
          - {platform: linux, os: ubuntu-latest, target: x86_64-unknown-linux-gnu}
          - {platform: macos, os: macos-latest, target: x86_64-apple-darwin}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-game-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-game-${{ matrix.platform }}-

      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: mingw-w64-ucrt-x86_64-gcc
          path-type: inherit

      - name: Install system deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render-util0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-xkb-dev libasound2-dev

      - name: Patch version into Cargo.toml
        shell: bash
        run: |
          sed -i -E "s/^version = \".*\"/version = \"${{ needs.resolve.outputs.version }}\"/" Cargo.toml
          grep -E "^version" Cargo.toml | head -1

      - name: Build workspace (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        env:
          # 仅对 x86_64-pc-windows-gnu 目标生效；其它平台忽略此变量
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Build workspace (Linux/macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Stage package
        shell: bash
        run: |
          STAGE="akrs-game"
          mkdir -p "$STAGE/scripts" "$STAGE/assets/fonts"
          mkdir -p "$STAGE/assets/bg" "$STAGE/assets/characters"
          mkdir -p "$STAGE/assets/music" "$STAGE/assets/sound" "$STAGE/assets/title"
          BIN_DIR="target/${{ matrix.target }}/release"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp "$BIN_DIR/akrs.exe" "$STAGE/"
            cp "$BIN_DIR/akrs-game.exe" "$STAGE/"
            find "$BIN_DIR/deps" -name "lewton.dll" -exec cp {} "$STAGE/" \; 2>/dev/null || true
            rm -f "$STAGE"/lewton-*.dll
            printf 'cd /d "%%~dp0"\r\nstart akrs-game.exe\r\n' > "$STAGE/启动游戏.bat"
          else
            cp "$BIN_DIR/akrs" "$STAGE/"
            cp "$BIN_DIR/akrs-game" "$STAGE/"
            printf '#!/bin/bash\ncd "$(dirname "$0")"\n./akrs-game\n' > "$STAGE/启动游戏.sh"
            chmod +x "$STAGE/启动游戏.sh"
          fi
          cp scripts/demo.akrs "$STAGE/scripts/" 2>/dev/null || true
          cp assets/fonts/NotoSansSC-Regular-subset.ttf "$STAGE/assets/fonts/" 2>/dev/null || true
          printf 'Akizuki*Rustgal ${{ needs.resolve.outputs.version }} (%s)\n\nWindows: 双击 启动游戏.bat\nLinux/macOS: ./启动游戏.sh\n命令行工具: akrs check scripts/demo.akrs\n' "${{ matrix.platform }}" > "$STAGE/README.txt"

      - name: Archive
        id: archive
        shell: bash
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          if [ "$PLATFORM" = "windows" ]; then
            ARTIFACT="akrs-game-${VERSION}-${PLATFORM}.zip"
            7z a -tzip "$ARTIFACT" akrs-game/
          else
            ARTIFACT="akrs-game-${VERSION}-${PLATFORM}.tar.gz"
            tar -czf "$ARTIFACT" akrs-game/
          fi
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          ls -lh "$ARTIFACT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: akrs-game-${{ needs.resolve.outputs.version }}-${{ matrix.platform }}
          path: ${{ steps.archive.outputs.artifact }}
          retention-days: 7

  release:
    name: Create Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          prerelease: ${{ needs.resolve.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*
