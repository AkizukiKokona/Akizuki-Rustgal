name: Editor Build

# 编辑器独立构建流水线（三平台矩阵）。
#
# 触发策略：
#   - push 到 main：仅当编辑器相关路径变化时，全平台并行构建
#   - workflow_dispatch：默认仅 Windows，下拉可选 linux / macos / all
#
# 产物作为 Actions artifact 上传，不创建 Release。
#
# 本地适配说明：
#   - Windows：需安装 MSYS2 并 `pacman -S mingw-w64-ucrt-x86_64-gcc`，
#     在 UCRT64 shell 中执行 `cargo build -p akrs-editor --release --target x86_64-pc-windows-gnu`
#   - Linux：需 `sudo apt-get install -y libxcb-render-util-dev libxcb-shape0-dev
#     libxcb-xfixes0-dev libxcb-xkb-dev libasound2-dev`
#   - macOS：仅需 Xcode 命令行工具。注意 macos-latest 为 arm64，构建
#     x86_64-apple-darwin 属交叉编译；若 miniaudio C 代码交叉编译失败，
#     可改用 macos-13（原生 x86_64 runner）。

on:
  push:
    branches: [main]
    paths:
      - "crates/akrs-editor/**"
      - "crates/akrs-core/**"
      - "crates/akrs-runtime/**"
      - "patches/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/editor-build.yml"
  workflow_dispatch:
    inputs:
      platform:
        description: "目标平台（默认仅 Windows）"
        type: choice
        options: [windows, linux, macos, all]
        default: windows

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  matrix:
    name: Resolve matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          PLAT: ${{ inputs.platform }}
        run: |
          python3 - <<'PY' > /tmp/matrix.json
          import json, os
          all_entries = [
            {"platform":"windows","os":"windows-latest","target":"x86_64-pc-windows-gnu","shell":"msys2 {0}","archive":"zip"},
            {"platform":"linux","os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","shell":"bash","archive":"tar.gz"},
            {"platform":"macos","os":"macos-latest","target":"x86_64-apple-darwin","shell":"bash","archive":"tar.gz"},
          ]
          event = os.environ.get("EVENT", "")
          plat = os.environ.get("PLAT", "")
          if event == "push" or plat == "all" or plat == "":
              sel = all_entries
          else:
              sel = [e for e in all_entries if e["platform"] == plat]
          print(json.dumps({"include": sel}))
          PY
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    needs: matrix
    if: needs.matrix.outputs.matrix != ''
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-editor-${{ matrix.platform }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-editor-${{ matrix.platform }}-

      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Install system deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render-util-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-xkb-dev libasound2-dev

      - name: Compute dev version
        id: ver
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          DATE=$(date -u +'%Y%m%d-%H%M')
          VERSION="0.0.0-dev.${COUNT}+${DATE}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Patch version into Cargo.toml
        shell: bash
        run: |
          sed -i -E "s/^version = \".*\"/version = \"${{ steps.ver.outputs.version }}\"/" Cargo.toml
          grep -E "^version" Cargo.toml | head -1

      - name: Build editor
        shell: ${{ matrix.shell }}
        env:
          # 仅对 x86_64-pc-windows-gnu 目标生效；其它平台忽略此变量
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build -p akrs-editor --release --target ${{ matrix.target }}

      - name: Stage package
        shell: bash
        run: |
          STAGE="akrs-editor"
          mkdir -p "$STAGE/assets/fonts"
          BIN_DIR="target/${{ matrix.target }}/release"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp "$BIN_DIR/akrs-editor.exe" "$STAGE/"
            find "$BIN_DIR/deps" -name "lewton.dll" -exec cp {} "$STAGE/" \; 2>/dev/null || true
            printf 'cd /d "%%~dp0"\r\nstart akrs-editor.exe\r\n' > "$STAGE/启动编辑器.bat"
          else
            cp "$BIN_DIR/akrs-editor" "$STAGE/"
            printf '#!/bin/bash\ncd "$(dirname "$0")"\n./akrs-editor\n' > "$STAGE/启动编辑器.sh"
            chmod +x "$STAGE/启动编辑器.sh"
          fi
          cp assets/fonts/NotoSansSC-Regular-subset.ttf "$STAGE/assets/fonts/" 2>/dev/null || true
          printf 'Akizuki*Rustgal Editor — 开发测试版 (%s)\n版本: %s\n\nWindows: 双击 启动编辑器.bat\nLinux/macOS: ./启动编辑器.sh\n' "${{ matrix.platform }}" "${{ steps.ver.outputs.version }}" > "$STAGE/README.txt"

      - name: Archive
        id: archive
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            ARTIFACT="akrs-editor-${VERSION}-${PLATFORM}.zip"
            zip -r "$ARTIFACT" akrs-editor/ -x "*.DS_Store"
          else
            ARTIFACT="akrs-editor-${VERSION}-${PLATFORM}.tar.gz"
            tar -czf "$ARTIFACT" akrs-editor/
          fi
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          ls -lh "$ARTIFACT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: akrs-editor-${{ steps.ver.outputs.version }}-${{ matrix.platform }}
          path: ${{ steps.archive.outputs.artifact }}
          retention-days: 30
          if-no-files-found: error
